<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Pliant:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pliant:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="header">
        <div class="header__container">
            <!-- Logo -->
            <div class="header__image-container">
                <img src="img/logo.png" alt="Logo pedorro" class="header__logo">
            </div>

            <!-- Titulo principal -->
            <div class="header__content">
                <h1 class="header__title">Calendario Kenyano</h1>
                <span class="header__description">Calendario para mierdas</span>
            </div>
        </div>

        <!-- Navegacion -->
        <nav class="main-nav">
            <ul class="main-nav__list">
                <li class="main-nav__item">
                    <details class="main-nav__dropdown">
                        <summary>Mes</summary>
                        <div class="main-nav__month-list">
                            <div>
                                <input type="radio" id="enero" name="mes" value="0" >
                                <label for="enero">Enero</label>
                            </div>
                            <div>
                                <input type="radio" id="febrero" name="mes" value="1" checked>
                                <label for="febrero">Febrero</label>
                            </div>
                            <div>
                                <input type="radio" id="marzo" name="mes" value="2">
                                <label for="marzo">Marzo</label>
                            </div>
                            <div>
                                <input type="radio" id="abril" name="mes" value="3">
                                <label for="abril">Abril</label>
                            </div>
                            <div>
                                <input type="radio" id="mayo" name="mes" value="4">
                                <label for="mayo">Mayo</label>
                            </div>
                            <div>
                                <input type="radio" id="junio" name="mes" value="5">
                                <label for="junio">Junio</label>
                            </div>
                            <div>
                                <input type="radio" id="julio" name="mes" value="6">
                                <label for="julio">Julio</label>
                            </div>
                            <div>
                                <input type="radio" id="agosto" name="mes" value="7">
                                <label for="agosto">Agosto</label>
                            </div>
                            <div>
                                <input type="radio" id="septiembre" name="mes" value="8">
                                <label for="septiembre">Septiembre</label>
                            </div>
                            <div>
                                <input type="radio" id="octubre" name="mes" value="9">
                                <label for="octubre">Octubre</label>
                            </div>
                            <div>
                                <input type="radio" id="noviembre" name="mes" value="10">
                                <label for="noviembre">Noviembre</label>
                            </div>
                            <div>
                                <input type="radio" id="diciembre" name="mes" value="11">
                                <label for="diciembre">Diciembre</label>
                            </div>


                        </div>

                    </details>
                </li>


            </ul>
        </nav>
    </header>

    <main>
        <table class="calendary">
            <!-- Encabezado del calendario -->
            <thead class="calendary__headers">
                <!-- Mes -->
                <tr class="calendary__month-row">
                    <th class="calendary__month-header" colspan="7">Enero - 2026</th>
                </tr>

                <!-- Dias -->
                <tr class="calendary__day-row">
                    <th class="calendary__day-header">Domingo</th>
                    <th class="calendary__day-header">Lunes</th>
                    <th class="calendary__day-header">Martes</th>
                    <th class="calendary__day-header">Miercoles</th>
                    <th class="calendary__day-header">Jueves</th>
                    <th class="calendary__day-header">Viernes</th>
                    <th class="calendary__day-header">Sabado</th>
                </tr>
            </thead>
            <!-- FIN Encabezado del calendario -->

            <!-- Cuerpo calendario (Dias en fecha) -->
            <tbody class="calendary__body">
                <tr class="calendary__week-row">
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                </tr>

                <tr class="calendary__week-row">
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                </tr>

                <tr class="calendary__week-row">
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                </tr>

                <tr class="calendary__week-row">
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                </tr>

                <tr class="calendary__week-row">
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                    <td class="calendary__date"></td>
                </tr>
            </tbody>

        </table>

        <!-- Formulario pedorro -->
        <dialog id="menuAgenda" class="event-menu">
            <form class="agenda__container" action="" method="post">
                <legend class="agenda__title">Crear eventos</legend>

                <div class="title_container">
                    <legend class="title">Titulo</legend>
                    <input type="text" placeholder="Ingresa un titulo" id="event__title" autocomplete="off">
                </div>

                <div class="date__container">
                    <label for="daysel">Fecha: </label>

                    <select name="daysel" id="daysel">
                        <option value="31">31</option>
                        <option value="30">30</option>
                        <option value="29">29</option>
                        <option value="28">28</option>
                        <option value="27">27</option>
                        <option value="26">26</option>
                        <option value="25">25</option>
                        <option value="24">24</option>
                        <option value="23">23</option>
                        <option value="22">22</option>
                        <option value="21">21</option>
                        <option value="20">20</option>
                        <option value="19">19</option>
                        <option value="18">18</option>
                        <option value="17">17</option>
                        <option value="16">16</option>
                        <option value="15">15</option>
                        <option value="14">14</option>
                        <option value="13">13</option>
                        <option value="12">12</option>
                        <option value="11">11</option>
                        <option value="10">10</option>
                        <option value="9">9</option>
                        <option value="8">8</option>
                        <option value="7">7</option>
                        <option value="6">6</option>
                        <option value="5">5</option>
                        <option value="4">4</option>
                        <option value="3">3</option>
                        <option value="2">2</option>
                        <option value="1">1</option>
                    </select>

                    <select name="monthsel" id="monthsel">
                        <option value="12">Diciembre</option>
                        <option value="11">Noviembre</option>
                        <option value="10">Octubre</option>
                        <option value="9">Septiembre</option>
                        <option value="8">Agosto</option>
                        <option value="7">Julio</option>
                        <option value="6">Junio</option>
                        <option value="5">Mayo</option>
                        <option value="4">Abril</option>
                        <option value="3">Marzo</option>
                        <option value="2">Febrero</option>
                        <option value="1" selected>Enero</option>
                    </select>

                    <select name="yearsel" id="yearsel">
                        <option value="2028">2028</option>
                        <option value="2027">2027</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>

                <div class="time_container">
                    <legend class="time_title">Hora</legend>
                    <input type="time" value="09:00:00" id="time__date">
                </div>


                <button id="close" type="submit">Aceptar</button>
            </form>

        </dialog>
    </main>


    <script src="script.js" type="module"></script>
</body>

</html>
