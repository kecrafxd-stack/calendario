<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - Diciembre</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Pliant:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pliant:ital,wght@0,100..900;1,100..900&family=Quicksand:wght@300..700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="header">
        <div class="header__container">
            <div class="header__image-container">
                <img src="img/logo.png" alt="Logo pedorro" class="header__logo">
            </div>

            <div class="header__content">
                <h1 class="header__title">Calendario Kenyano</h1>
                <span class="header__description">Calendario para mierdas</span>
            </div>
        </div>

        <nav class="main-nav">
            <ul class="main-nav__list">
                <li class="main-nav__item">
                    <details class="main-nav__dropdown">
                        <summary>Mes</summary>

                        <ul class="main-nav__month-list">
                            sel
                        </ul>
                    </details>
                    <a href="" class="main-nav__link"></a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <table class="calendary">
            <thead class="calendary__headers">
                <tr class="calendary__month-row">
                    <th class="calendary__month-header" colspan="7">Diciembre - 2026</th>
                </tr>

                <tr class="calendary__day-row">
                    <th class="calendary__day-header">Domingo</th>
                    <th class="calendary__day-header">Lunes</th>
                    <th class="calendary__day-header">Martes</th>
                    <th class="calendary__day-header">Miercoles</th>
                    <th class="calendary__day-header">Jueves</th>
                    <th class="calendary__day-header">Viernes</th>
                    <th class="calendary__day-header">Sabado</th>
                </tr>
            </thead>
            <tbody class="calendary__body">
                <tr class="calendary__week-row">
                    <td class="calendary__date--previous-month">29</td>
                    <td class="calendary__date--previous-month">30</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="1" data-year="2026">1</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="2" data-year="2026">2</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="3" data-year="2026">3</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="4" data-year="2026">4</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="5" data-year="2026">5</td>
                </tr>
                <tr class="calendary__week-row">
                    <td class="calendary__date" data-month="Diciembre" data-date="6" data-year="2026">6</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="7" data-year="2026">7</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="8" data-year="2026">8</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="9" data-year="2026">9</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="10" data-year="2026">10</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="11" data-year="2026">11</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="12" data-year="2026">12</td>
                </tr>
                <tr class="calendary__week-row">
                    <td class="calendary__date" data-month="Diciembre" data-date="13" data-year="2026">13</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="14" data-year="2026">14</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="15" data-year="2026">15</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="16" data-year="2026">16</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="17" data-year="2026">17</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="18" data-year="2026">18</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="19" data-year="2026">19</td>
                </tr>
                <tr class="calendary__week-row">
                    <td class="calendary__date" data-month="Diciembre" data-date="20" data-year="2026">20</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="21" data-year="2026">21</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="22" data-year="2026">22</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="23" data-year="2026">23</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="24" data-year="2026">24</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="25" data-year="2026">25</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="26" data-year="2026">26</td>
                </tr>
                <tr class="calendary__week-row">
                    <td class="calendary__date" data-month="Diciembre" data-date="27" data-year="2026">27</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="28" data-year="2026">28</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="29" data-year="2026">29</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="30" data-year="2026">30</td>
                    <td class="calendary__date" data-month="Diciembre" data-date="31" data-year="2026">31</td>
                    <td class="calendary__date--previous-month">1</td>
                    <td class="calendary__date--previous-month">2</td>
                </tr>
            </tbody>
        </table>

        <dialog id="menuAgenda" class="event-menu">
            <form class="agenda__container">
                <legend class="agenda__title">Crear eventos</legend>

                <div class="title_container">
                    <legend class="title">Titulo</legend>
                    <input type="text" placeholder="Ingresa un titulo" id="event__title" autocomplete="off">
                </div>

                <div class="date__container">
                    <label for="daysel">Fecha: </label>

                    <select name="daysel" id="daysel">
                        <option value="31">31</option>
                        <option value="30">30</option>
                        <option value="29">29</option>
                        <option value="28">28</option>
                        <option value="27">27</option>
                        <option value="26">26</option>
                        <option value="25">25</option>
                        <option value="24">24</option>
                        <option value="23">23</option>
                        <option value="22">22</option>
                        <option value="21">21</option>
                        <option value="20">20</option>
                        <option value="19">19</option>
                        <option value="18">18</option>
                        <option value="17">17</option>
                        <option value="16">16</option>
                        <option value="15">15</option>
                        <option value="14">14</option>
                        <option value="13">13</option>
                        <option value="12">12</option>
                        <option value="11">11</option>
                        <option value="10">10</option>
                        <option value="9">9</option>
                        <option value="8">8</option>
                        <option value="7">7</option>
                        <option value="6">6</option>
                        <option value="5">5</option>
                        <option value="4">4</option>
                        <option value="3">3</option>
                        <option value="2">2</option>
                        <option value="1">1</option>
                    </select>

                    <select name="monthsel" id="monthsel">
                        <option value="12" selected>Diciembre</option>
                        <option value="11">Noviembre</option>
                        <option value="10">Octubre</option>
                        <option value="9">Septiembre</option>
                        <option value="8">Agosto</option>
                        <option value="7">Julio</option>
                        <option value="6">Junio</option>
                        <option value="5">Mayo</option>
                        <option value="4">Abril</option>
                        <option value="3">Marzo</option>
                        <option value="2">Febrero</option>
                        <option value="1">Enero</option>
                    </select>

                    <select name="yearsel" id="yearsel">
                        <option value="2028">2028</option>
                        <option value="2027">2027</option>
                        <option value="2026" selected>2026</option>
                    </select>
                </div>

                <div class="time_container">
                    <legend class="time_title">Hora</legend>
                    <input type="time" value="09:00:00" id="time__date">
                </div>

                <button id="close" type="submit">Aceptar</button>
            </form>
        </dialog>
    </main>

    <script src="script.js"></script>
</body>

</html>
